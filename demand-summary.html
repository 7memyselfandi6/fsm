<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demand Summary — Fertilizer Management System</title>
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="./components/header/header.css" />
    <link rel="stylesheet" href="./styles/demand-summary.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar-root"></aside>
      <main class="main-area">
        <header id="header-root"></header>
        <section class="ds-page" aria-label="Demand summary">
          <div class="ds-surface">
            <div class="ds-card" role="region" aria-label="Fertilizer demand summary">
              <div class="ds-top">
                <div class="ds-who">You are: kebele acc (Development Agent (DA))</div>
                <div class="ds-user" aria-hidden="true">
                  <svg width="26" height="26" viewBox="0 0 24 24">
                    <circle
                      cx="12"
                      cy="12"
                      r="10"
                      fill="none"
                      stroke="rgba(0, 0, 0, 0.65)"
                      stroke-width="1.8"
                    />
                    <circle cx="12" cy="10" r="2.3" fill="none" stroke="rgba(0,0,0,0.65)" stroke-width="1.6" />
                    <path
                      d="M7.5 17.2c1.2-2.4 2.9-3.6 4.5-3.6s3.3 1.2 4.5 3.6"
                      fill="none"
                      stroke="rgba(0,0,0,0.65)"
                      stroke-width="1.6"
                      stroke-linecap="round"
                    />
                  </svg>
                </div>
              </div>

              <div class="ds-divider" aria-hidden="true"></div>

              <div class="ds-title">Fertilizer Demand (2018/19)</div>

              <div class="ds-cols" role="group" aria-label="Demand columns">
                <div class="ds-col left">Type</div>
                <div class="ds-col mid">Amount (qt)<br />Demand Collected</div>
                <div class="ds-col right">Estimated Amount (qt)<br />Intelligence</div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
