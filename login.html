<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoA Login — Fertilizer Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="./components/header/header.css" />
    <link rel="stylesheet" href="./styles/login.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar-root"></aside>
      <main class="main-area">
        <header id="header-root"></header>
        <section class="login-page">
          <header class="topbar">
            <div class="topbar-left">
              <div class="topbar-title">MoA Login</div>
              <div class="topbar-subtitle">Username / Email / Mobile</div>
            </div>
            <a class="topbar-cta" href="#loginForm">Sign In</a>
          </header>

          <section class="login-shell" aria-label="Login">
            <section class="login-left" aria-hidden="true"></section>
            <section class="login-right">
              <div class="login-content">
                <header class="login-header">
                  <h1>WELCOME BACK</h1>
                  <h2>FERTILIZER MANAGEMENT<br />SYSTEM</h2>
                  <p>
                    Log in to your account to access your Super<br />
                    Admin Login Portal
                  </p>
                </header>

                <form class="login-form" id="loginForm" novalidate>
                  <div class="field">
                    <label class="visually-hidden" for="username">Username</label>
                    <span class="icon" aria-hidden="true">
                      <svg width="16" height="16" viewBox="0 0 24 24">
                        <path
                          d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.4 0-8 2.2-8 5v2h16v-2c0-2.8-3.6-5-8-5z"
                          fill="currentColor"
                        />
                      </svg>
                    </span>
                    <input
                      id="username"
                      name="username"
                      type="text"
                      placeholder="Username"
                      autocomplete="username"
                      aria-required="true"
                      aria-describedby="userError"
                    />
                  </div>
                  <p id="userError" class="error" role="alert" aria-live="polite"></p>

                  <div class="field">
                    <label class="visually-hidden" for="password">Password</label>
                    <span class="icon" aria-hidden="true">
                      <svg width="16" height="16" viewBox="0 0 24 24">
                        <path
                          d="M17 11V8a5 5 0 0 0-10 0v3"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                        />
                        <rect
                          x="5"
                          y="11"
                          width="14"
                          height="9"
                          rx="2"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        />
                      </svg>
                    </span>
                    <input
                      id="password"
                      name="password"
                      type="password"
                      placeholder="Password"
                      autocomplete="current-password"
                      aria-required="true"
                      aria-describedby="passError"
                    />
                  </div>
                  <p id="passError" class="error" role="alert" aria-live="polite"></p>

                  <button type="submit" class="login-btn" id="loginBtn">LOGIN</button>
                </form>

                <div class="links-row">
                  <a href="#" class="muted">Create Account</a>
                  <a href="#" class="muted">Need Help?</a>
                </div>
              </div>
              <footer class="login-footer">
                © 2026 Fertilizer Management System. All rights reserved.
              </footer>
            </section>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="./js/app.js"></script>
    <script src="./js/login.js" type="module"></script>
  </body>
</html>
