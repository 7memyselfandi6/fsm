<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Re-allocation — Fertilizer Management System</title>
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="./components/header/header.css" />
    <link rel="stylesheet" href="./styles/re-allocation.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar-root"></aside>
      <main class="main-area">
        <header id="header-root"></header>
        <section class="realloc-page" aria-label="Re-allocation">
          <div class="realloc-surface">
            <header class="realloc-head">
              <h1 class="realloc-title">የማዳበሪያ ድልድል ማስተካከያ</h1>
              <h2 class="realloc-subtitle">ክልሎች ድምር:</h2>
            </header>

            <div class="realloc-pills" role="group" aria-label="Fertilizer totals">
              <div class="realloc-pill" aria-label="DAP total">
                <span class="realloc-pill-label">DAP</span>
                <strong class="realloc-pill-value">1,316,258</strong>
              </div>
              <div class="realloc-pill" aria-label="UREA total">
                <span class="realloc-pill-label">UREA</span>
                <strong class="realloc-pill-value">1,058,471</strong>
              </div>
            </div>

            <div class="realloc-grid" aria-label="Regional re-allocation cards">
              <article class="realloc-card" aria-label="Afar re-allocation">
                <div class="realloc-card-title">
                  Afar <span class="realloc-card-count">(7,500)</span>
                </div>
                <div class="realloc-card-body">
                  <div class="realloc-flag" aria-hidden="true">
                    <svg viewBox="0 0 90 60" width="90" height="60">
                      <rect width="90" height="20" y="0" fill="#0d47a1" />
                      <rect width="90" height="20" y="20" fill="#ffffff" />
                      <rect width="90" height="20" y="40" fill="#1b5e20" />
                      <polygon points="0,0 34,30 0,60" fill="#d32f2f" />
                      <g transform="translate(23 30)">
                        <circle r="7" fill="#d32f2f" opacity="0.12" />
                        <path
                          d="M0-8 2-2 8-2 3 1 5 7 0 3 -5 7 -3 1 -8-2 -2-2Z"
                          fill="#f4c21e"
                        />
                      </g>
                    </svg>
                  </div>
                  <div class="realloc-lines">
                    <div class="realloc-line">
                      <span class="realloc-label">DAP</span>
                      <span class="realloc-value">3,750</span>
                    </div>
                    <div class="realloc-line">
                      <span class="realloc-label">UREA</span>
                      <span class="realloc-value">3,750</span>
                    </div>
                  </div>
                </div>
              </article>

              <article class="realloc-card" aria-label="Benishangul-Gumuz re-allocation">
                <div class="realloc-card-title">
                  Benishangul-Gumuz <span class="realloc-card-count">(23,134)</span>
                </div>
                <div class="realloc-card-body">
                  <div class="realloc-flag" aria-hidden="true">
                    <svg viewBox="0 0 90 60" width="90" height="60">
                      <rect width="90" height="20" y="0" fill="#d32f2f" />
                      <rect width="90" height="20" y="20" fill="#111111" />
                      <rect width="90" height="20" y="40" fill="#f4c21e" />
                      <polygon points="0,0 34,30 0,60" fill="#1b5e20" />
                    </svg>
                  </div>
                  <div class="realloc-lines">
                    <div class="realloc-line">
                      <span class="realloc-label">DAP</span>
                      <span class="realloc-value">12,848</span>
                    </div>
                    <div class="realloc-line">
                      <span class="realloc-label">UREA</span>
                      <span class="realloc-value">10,286</span>
                    </div>
                  </div>
                </div>
              </article>

              <article class="realloc-card" aria-label="Amhara re-allocation">
                <div class="realloc-card-title">
                  Amhara <span class="realloc-card-count">(880,000)</span>
                </div>
                <div class="realloc-card-body">
                  <div class="realloc-flag" aria-hidden="true">
                    <svg viewBox="0 0 90 60" width="90" height="60">
                      <rect width="45" height="60" x="0" y="0" fill="#f4c21e" />
                      <rect width="45" height="60" x="45" y="0" fill="#d32f2f" />
                      <g transform="translate(62 30)">
                        <path
                          d="M0-11 3-3 11-3 4 1 6 9 0 4 -6 9 -4 1 -11-3 -3-3Z"
                          fill="#f4c21e"
                        />
                      </g>
                    </svg>
                  </div>
                  <div class="realloc-lines">
                    <div class="realloc-line">
                      <span class="realloc-label">DAP</span>
                      <span class="realloc-value">440,000</span>
                    </div>
                    <div class="realloc-line">
                      <span class="realloc-label">UREA</span>
                      <span class="realloc-value">440,000</span>
                    </div>
                  </div>
                </div>
              </article>

              <article class="realloc-card" aria-label="Central Ethiopia re-allocation">
                <div class="realloc-card-title">
                  Central Ethiopia <span class="realloc-card-count">(160,000)</span>
                </div>
                <div class="realloc-card-body">
                  <div class="realloc-flag" aria-hidden="true">
                    <svg viewBox="0 0 90 60" width="90" height="60">
                      <rect width="90" height="18" y="0" fill="#1b5e20" />
                      <rect width="90" height="24" y="18" fill="#ffffff" />
                      <rect width="90" height="18" y="42" fill="#d32f2f" />
                      <g transform="translate(45 30)">
                        <circle r="9" fill="#2b5bff" opacity="0.18" />
                        <g fill="#2b5bff">
                          <circle cx="0" cy="-9" r="1.2" />
                          <circle cx="4.5" cy="-7.5" r="1.2" />
                          <circle cx="7.5" cy="-4.5" r="1.2" />
                          <circle cx="9" cy="0" r="1.2" />
                          <circle cx="7.5" cy="4.5" r="1.2" />
                          <circle cx="4.5" cy="7.5" r="1.2" />
                          <circle cx="0" cy="9" r="1.2" />
                          <circle cx="-4.5" cy="7.5" r="1.2" />
                          <circle cx="-7.5" cy="4.5" r="1.2" />
                          <circle cx="-9" cy="0" r="1.2" />
                          <circle cx="-7.5" cy="-4.5" r="1.2" />
                          <circle cx="-4.5" cy="-7.5" r="1.2" />
                        </g>
                      </g>
                    </svg>
                  </div>
                  <div class="realloc-lines">
                    <div class="realloc-line">
                      <span class="realloc-label">DAP</span>
                      <span class="realloc-value">88,000</span>
                    </div>
                    <div class="realloc-line">
                      <span class="realloc-label">UREA</span>
                      <span class="realloc-value">72,000</span>
                    </div>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
