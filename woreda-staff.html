<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Woreda Staff — Fertilizer Management System</title>
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="./components/header/header.css" />
    <link rel="stylesheet" href="./styles/woreda-staff.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar-root"></aside>
      <main class="main-area">
        <header id="header-root"></header>
        <section class="ws-page" aria-label="Woreda staff demand">
          <div class="ws-surface">
            <div class="ws-panel" role="region" aria-label="Region demand">
              <div class="ws-flags" aria-hidden="true">
                <svg class="ws-flag" viewBox="0 0 48 32" width="48" height="32">
                  <rect width="48" height="10.67" y="0" fill="#1b5e20" />
                  <rect width="48" height="10.67" y="10.67" fill="#ffffff" />
                  <rect width="48" height="10.66" y="21.34" fill="#d32f2f" />
                </svg>
                <svg class="ws-flag" viewBox="0 0 48 32" width="48" height="32">
                  <rect width="48" height="10.67" y="0" fill="#1b5e20" />
                  <rect width="48" height="10.67" y="10.67" fill="#ffffff" />
                  <rect width="48" height="10.66" y="21.34" fill="#d32f2f" />
                  <g transform="translate(24 16)">
                    <circle r="6.4" fill="#2b5bff" opacity="0.14" />
                    <g fill="#2b5bff">
                      <circle cx="0" cy="-6" r="0.9" />
                      <circle cx="3" cy="-5" r="0.9" />
                      <circle cx="5" cy="-3" r="0.9" />
                      <circle cx="6" cy="0" r="0.9" />
                      <circle cx="5" cy="3" r="0.9" />
                      <circle cx="3" cy="5" r="0.9" />
                      <circle cx="0" cy="6" r="0.9" />
                      <circle cx="-3" cy="5" r="0.9" />
                      <circle cx="-5" cy="3" r="0.9" />
                      <circle cx="-6" cy="0" r="0.9" />
                      <circle cx="-5" cy="-3" r="0.9" />
                      <circle cx="-3" cy="-5" r="0.9" />
                    </g>
                  </g>
                </svg>
              </div>

              <h1 class="ws-title">REGION Demand ()</h1>

              <div class="ws-total" aria-label="Total demand">
                <div class="ws-total-label">TOTAL DEMAND</div>
                <div class="ws-total-value">0 Qt</div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
